<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5ea1ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="환율계산기" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>실시간 환율 계산기</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root { --radius: 14px; --radius-sm: 10px; }

    [data-theme="dark"] {
      --bg: #0f1115; --panel: #171a21; --panel-2: #1e2333; --widget: #1a2540;
      --text: #eef2ff; --muted: #8892a4; --accent: #5ea1ff; --accent-dim: rgba(94,161,255,.15);
      --green: #4ade80; --red: #f87171; --border: #252e42; --shadow: 0 20px 60px rgba(0,0,0,.5);
      --input-bg: #0e1420; --btn-bg: #1a2030; --modal-bg: #1a1f2e; --overlay: rgba(0,0,0,.7);
      color-scheme: dark;
    }
    [data-theme="light"] {
      --bg: #eef2fb; --panel: #ffffff; --panel-2: #f7f9ff; --widget: #dce8ff;
      --text: #1a1e2c; --muted: #5b6476; --accent: #2563eb; --accent-dim: rgba(37,99,235,.12);
      --green: #16a34a; --red: #dc2626; --border: #c8d4f0; --shadow: 0 8px 30px rgba(0,0,50,.1);
      --input-bg: #ffffff; --btn-bg: #f0f4ff; --modal-bg: #ffffff; --overlay: rgba(0,0,0,.4);
      color-scheme: light;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; min-height: 100%; background: var(--bg); color: var(--text);
      font-family: "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif; }
    body { min-height: 100dvh; display: grid; place-items: start center; padding: 14px; }
    .app { width: min(100%, 580px); display: grid; gap: 12px; }

    /* ── Header ── */
    header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border); border-radius: 18px; padding: 14px 16px;
      box-shadow: var(--shadow); }
    h1 { margin: 0; font-size: clamp(1.1rem, 2.6vw, 1.45rem); }
    .sub { margin: 3px 0 0; color: var(--muted); font-size: 0.82rem; }
    .header-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--btn-bg); font-size: 1.05rem; cursor: pointer; color: var(--text);
      display: grid; place-items: center; transition: background .15s; }
    .icon-btn:hover { background: var(--accent-dim); }

    /* ── Cards ── */
    .widget-card, .chart-card, .fav-card, .calc-card {
      border: 1px solid var(--border); border-radius: var(--radius); padding: 14px;
      box-shadow: var(--shadow); }
    .widget-card { background: linear-gradient(180deg, var(--widget), #1a2236); }
    [data-theme="light"] .widget-card { background: linear-gradient(180deg, var(--widget), #c8deff); }
    .chart-card, .fav-card { background: linear-gradient(180deg, var(--panel), var(--panel-2)); }
    .calc-card { background: var(--input-bg); }
    .card-title { margin: 0 0 10px; font-size: .95rem; font-weight: 700; }

    /* ── Widget ── */
    .base-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .base-tab { min-height: 34px; padding: 0 12px; border-radius: 9px; border: 1px solid var(--border);
      background: var(--btn-bg); color: var(--muted); font-size: .85rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 5px; transition: all .15s; white-space: nowrap; }
    .base-tab.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .base-amount-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .base-amount-input { flex: 1; min-height: 42px; border-radius: 11px; border: 1px solid var(--border);
      background: var(--input-bg); color: var(--text); font-size: 1.1rem; font-weight: 700;
      padding: 0 12px; outline: none; text-align: right; }
    .base-amount-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .base-amount-code { font-size: .9rem; font-weight: 700; color: var(--muted); min-width: 36px; }
    .widget-list { display: grid; gap: 8px; margin: 0; padding: 0; list-style: none; }
    .widget-list li { display: flex; justify-content: space-between; align-items: center; gap: 8px;
      background: rgba(0,0,0,.15); border: 1px solid #344260; border-radius: 12px;
      padding: 10px 12px; cursor: pointer; transition: background .15s; }
    [data-theme="light"] .widget-list li { border-color: var(--border); background: rgba(255,255,255,.5); }
    .widget-list li:hover { background: var(--accent-dim); }
    .widget-list li.selected { border-color: var(--accent); background: var(--accent-dim); }
    .wi-left { display: flex; align-items: center; gap: 6px; }
    .wi-time { font-size: .7rem; color: var(--accent); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .wi-right { text-align: right; }
    .wi-val { font-size: .98rem; font-weight: 700; }
    .wi-sub { display: flex; justify-content: flex-end; align-items: center; gap: 6px; margin-top: 2px; }
    .wi-rate { font-size: .76rem; color: var(--muted); }
    .wi-change { font-size: .76rem; font-weight: 600; }
    .wi-change.up { color: var(--green); }
    .wi-change.dn { color: var(--red); }
    .muted { color: var(--muted); font-size: .82rem; margin-top: 8px; }

    /* ── Chart ── */
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .chart-header .card-title { margin: 0; }
    .period-btns { display: flex; gap: 5px; }
    .period-btn { height: 28px; padding: 0 10px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--btn-bg); color: var(--muted); font-size: .8rem; font-weight: 600; cursor: pointer; }
    .period-btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .chart-wrap { position: relative; height: 160px; }
    .chart-loading { position: absolute; inset: 0; display: grid; place-items: center;
      color: var(--muted); font-size: .85rem; }
    .chart-loading.hidden { display: none; }

    /* ── Favorites ── */
    .fav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .fav-header .card-title { margin: 0; }
    .text-btn { background: none; border: none; color: var(--accent); font-size: .83rem;
      font-weight: 600; cursor: pointer; padding: 4px 6px; border-radius: 6px; }
    .text-btn:hover { background: var(--accent-dim); }
    .fav-list { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
    .fav-btn { position: relative; min-height: 36px; padding: 0 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--btn-bg); color: var(--text);
      font-size: .88rem; font-weight: 600; cursor: pointer; transition: all .15s; }
    .fav-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
    .fav-del { position: absolute; top: -5px; right: -5px; width: 17px; height: 17px;
      border-radius: 50%; background: var(--red); color: #fff; border: none;
      font-size: .7rem; cursor: pointer; display: none; place-items: center; line-height: 1; }
    .fav-edit-mode .fav-del { display: grid; }
    .fav-add-btn { min-height: 36px; width: 36px; border-radius: 10px; border: 1px dashed var(--border);
      background: none; color: var(--muted); font-size: 1.2rem; cursor: pointer;
      display: grid; place-items: center; transition: all .15s; }
    .fav-add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .fav-input-row { display: flex; gap: 6px; align-items: center; width: 100%; margin-top: 4px; }
    .fav-input { flex: 1; min-height: 36px; border-radius: 10px; border: 1px solid var(--accent);
      background: var(--input-bg); color: var(--text); font-size: .9rem; padding: 0 10px; outline: none; }
    .fav-confirm { min-height: 36px; padding: 0 12px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-size: .85rem; font-weight: 700; cursor: pointer; }

    /* ── Calc ── */
    .inputs { display: grid; gap: 9px; }
    .row { display: grid; grid-template-columns: 96px 1fr; align-items: center; gap: 10px; }
    .row label { color: var(--muted); font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .input-wrap { display: flex; align-items: center; gap: 6px; }
    .input-wrap input { flex: 1; min-width: 0; min-height: 52px; border-radius: 13px;
      border: 1px solid var(--border); background: var(--input-bg); color: var(--text);
      font-size: 1.05rem; padding: 0 12px; outline: none; }
    .input-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .copy-btn { min-width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--btn-bg); color: var(--muted); font-size: .95rem; cursor: pointer;
      display: grid; place-items: center; flex-shrink: 0; transition: all .15s; }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .status { min-height: 1.2em; color: var(--muted); font-size: .82rem; margin-top: 8px; }
    .status.error { color: var(--red); }
    .status.ok { color: var(--green); }

    /* ── Settings Modal ── */
    .overlay { position: fixed; inset: 0; background: var(--overlay); z-index: 10;
      backdrop-filter: blur(4px); }
    .overlay.hidden { display: none; }
    .modal { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: min(100%, 580px); background: var(--modal-bg); border-top-left-radius: 20px;
      border-top-right-radius: 20px; border: 1px solid var(--border); z-index: 11;
      padding: 20px 16px 30px; max-height: 70dvh; overflow-y: auto; }
    .modal.hidden { display: none; }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px;
      margin: 0 auto 16px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .modal-header h3 { margin: 0; font-size: 1rem; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.1rem;
      cursor: pointer; padding: 4px 8px; border-radius: 8px; }
    .modal-close:hover { background: var(--accent-dim); color: var(--accent); }
    .modal-desc { margin: 0 0 14px; color: var(--muted); font-size: .82rem; }
    .currency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
    .cur-chip { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--btn-bg); cursor: pointer;
      transition: all .15s; user-select: none; }
    .cur-chip.selected { border-color: var(--accent); background: var(--accent-dim); }
    .cur-chip.locked { opacity: .5; cursor: default; }
    .cur-chip-info { display: flex; flex-direction: column; }
    .cur-chip-code { font-size: .85rem; font-weight: 700; }
    .cur-chip-name { font-size: .72rem; color: var(--muted); }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 20px;
      font-size: .88rem; font-weight: 600; opacity: 0; transition: all .25s; pointer-events: none; z-index: 99; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Flag img ── */
    img.flag { border-radius: 3px; vertical-align: middle; flex-shrink: 0; }

    /* ── Responsive ── */
    @media (max-width: 430px) {
      body { padding: 10px; }
      .row { grid-template-columns: 1fr; gap: 5px; }
      .currency-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    }
  </style>
</head>
<body>
  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Overlay + Settings Modal -->
  <div id="overlay" class="overlay hidden"></div>
  <div id="settingsModal" class="modal hidden">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3>통화 선택</h3>
      <button class="modal-close" id="closeSettings">✕</button>
    </div>
    <p class="modal-desc">최소 2개 이상 선택 · KRW는 고정</p>
    <div class="currency-grid" id="currencyGrid"></div>
  </div>

  <main class="app">
    <!-- Header -->
    <header>
      <div>
        <h1>실시간 환율 계산기</h1>
        <p class="sub" id="activeSub"></p>
      </div>
      <div class="header-btns">
        <button class="icon-btn" id="themeBtn" title="테마 전환">🌙</button>
        <button class="icon-btn" id="settingsBtn" title="통화 설정">⚙️</button>
      </div>
    </header>

    <!-- Widget Card -->
    <section class="widget-card">
      <h2 class="card-title">실시간 환율</h2>
      <div class="base-tabs" id="baseTabs"></div>
      <div class="base-amount-row">
        <input type="text" id="widgetAmountInput" class="base-amount-input" inputmode="decimal" />
        <span class="base-amount-code" id="widgetBaseLabel"></span>
      </div>
      <ul class="widget-list" id="widgetList"></ul>
      <p id="widgetUpdated" class="muted">마지막 업데이트: 불러오는 중...</p>
    </section>

    <!-- Favorites Card -->
    <section class="fav-card">
      <div class="fav-header">
        <h2 class="card-title">즐겨찾기 금액 (KRW)</h2>
        <button class="text-btn" id="favEditBtn">편집</button>
      </div>
      <div class="fav-list" id="favList"></div>
    </section>

    <!-- Calc Card -->
    <section class="calc-card">
      <h2 class="card-title">직접 입력</h2>
      <div class="inputs" id="calcInputs"></div>
      <div id="status" class="status"></div>
    </section>

    <!-- Chart Card -->
    <section class="chart-card">
      <div class="chart-header">
        <h2 class="card-title" id="chartTitle">항목을 클릭하면 차트가 표시됩니다</h2>
        <div class="period-btns">
          <button class="period-btn active" data-days="7">7일</button>
          <button class="period-btn" data-days="30">30일</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="rateChart"></canvas>
        <div id="chartLoading" class="chart-loading hidden">불러오는 중...</div>
      </div>
    </section>
  </main>

  <script>
  (() => {
    'use strict';

    // ── Constants ─────────────────────────────────────────
    const RATE_API   = 'https://open.er-api.com/v6/latest/USD';
    const HIST_API   = 'https://api.frankfurter.app';
    const REFRESH_MS = 10 * 60 * 1000;

    const CHART_COLORS = {
      JPY:'#f6c90e', USD:'#4ade80', EUR:'#5ea1ff', HUF:'#f472b6',
      CNY:'#fb923c', GBP:'#a78bfa', SGD:'#34d399', AUD:'#f87171',
      CAD:'#60a5fa', THB:'#fbbf24',
    };

    const ALL = {
      KRW: { name:'한국 원',         flag:'kr', int:true,  tz:'Asia/Seoul',       tzs:'KST' },
      JPY: { name:'일본 엔',         flag:'jp', int:true,  tz:'Asia/Tokyo',       tzs:'JST' },
      USD: { name:'미국 달러',       flag:'us', int:false, tz:'America/New_York', tzs:'ET'  },
      EUR: { name:'유로',            flag:'eu', int:false, tz:'Europe/Paris',     tzs:'CET' },
      HUF: { name:'헝가리 포린트',  flag:'hu', int:true,  tz:'Europe/Budapest',  tzs:'CET' },
      CNY: { name:'중국 위안',       flag:'cn', int:false, tz:'Asia/Shanghai',    tzs:'CST' },
      GBP: { name:'영국 파운드',     flag:'gb', int:false, tz:'Europe/London',    tzs:'BST' },
      SGD: { name:'싱가포르 달러',   flag:'sg', int:false, tz:'Asia/Singapore',   tzs:'SGT' },
      AUD: { name:'호주 달러',       flag:'au', int:false, tz:'Australia/Sydney', tzs:'AEST'},
      CAD: { name:'캐나다 달러',     flag:'ca', int:false, tz:'America/Toronto',  tzs:'ET'  },
      THB: { name:'태국 바트',       flag:'th', int:false, tz:'Asia/Bangkok',     tzs:'ICT' },
    };

    // ── State ─────────────────────────────────────────────
    let activeCodes  = JSON.parse(lsGet('activeCodes')) || ['KRW','JPY','USD','EUR','HUF'];
    let widgetBase   = lsGet('widgetBase') || 'KRW';
    let widgetAmt    = parseFloat(lsGet('widgetAmt')) || 1000;
    let favAmounts   = JSON.parse(lsGet('favAmounts')) || [10000, 50000, 100000, 500000];
    let favEditMode  = false;
    let darkMode     = lsGet('darkMode') !== 'false';
    let usdRates     = null;
    let prevRates    = null;
    let chartCode    = null;
    let chartDays    = 7;
    let histCache    = {};
    let chartInst    = null;
    let isUpdating   = false;
    let calcEls      = {};
    let favAddOpen   = false;

    // ── localStorage ──────────────────────────────────────
    function lsGet(k) { return localStorage.getItem(k); }
    function lsSet(k, v) { localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v)); }

    // ── Helpers ───────────────────────────────────────────
    function flagImg(code, size) {
      const c = ALL[code];
      if (!c) return '';
      return `<img class="flag" src="https://flagcdn.com/32x24/${c.flag}.png" alt="${code}" width="${size}">`;
    }

    function parseVal(str) {
      if (str === '' || str == null) return NaN;
      return parseFloat(String(str).replace(/,/g, ''));
    }

    function fmtDisp(val, code) {
      if (!isFinite(val)) return '';
      const dec = ALL[code]?.int ? 0 : 2;
      return new Intl.NumberFormat('ko-KR', { minimumFractionDigits: 0, maximumFractionDigits: dec }).format(val);
    }

    function fmtRate(v) {
      if (v >= 100) return new Intl.NumberFormat('ko-KR', { maximumFractionDigits: 0 }).format(v) + '원';
      if (v >= 1)   return new Intl.NumberFormat('ko-KR', { maximumFractionDigits: 2 }).format(v) + '원';
      return new Intl.NumberFormat('ko-KR', { maximumFractionDigits: 4 }).format(v) + '원';
    }

    function convert(amount, from, to) {
      if (!usdRates || !usdRates[from] || !usdRates[to]) return null;
      return (amount / usdRates[from]) * usdRates[to];
    }

    function convertWith(rates, amount, from, to) {
      if (!rates || !rates[from] || !rates[to]) return null;
      return (amount / rates[from]) * rates[to];
    }

    function formatDate(d) {
      return d.toISOString().split('T')[0];
    }

    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    // ── Theme ─────────────────────────────────────────────
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
      document.getElementById('themeBtn').textContent = darkMode ? '🌙' : '☀️';
      if (chartInst) updateChartColors();
    }

    function updateChartColors() {
      if (!chartInst) return;
      const mutedColor = cssVar('--muted');
      chartInst.options.scales.x.ticks.color = mutedColor;
      chartInst.options.scales.y.ticks.color = mutedColor;
      chartInst.options.scales.x.grid.color = darkMode ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.06)';
      chartInst.options.scales.y.grid.color = darkMode ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.06)';
      chartInst.update('none');
    }

    // ── Toast ─────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    // ── Settings Modal ────────────────────────────────────
    function openSettings() {
      document.getElementById('settingsModal').classList.remove('hidden');
      document.getElementById('overlay').classList.remove('hidden');
    }
    function closeSettings() {
      document.getElementById('settingsModal').classList.add('hidden');
      document.getElementById('overlay').classList.add('hidden');
    }

    function renderCurrencyGrid() {
      const grid = document.getElementById('currencyGrid');
      grid.innerHTML = Object.entries(ALL).map(([code, info]) => {
        const sel = activeCodes.includes(code);
        const locked = code === 'KRW';
        return `<div class="cur-chip ${sel ? 'selected' : ''} ${locked ? 'locked' : ''}" data-code="${code}">
          ${flagImg(code, 22)}
          <div class="cur-chip-info">
            <span class="cur-chip-code">${code}</span>
            <span class="cur-chip-name">${info.name}</span>
          </div>
        </div>`;
      }).join('');
      grid.querySelectorAll('.cur-chip:not(.locked)').forEach(chip => {
        chip.addEventListener('click', () => toggleCurrency(chip.dataset.code));
      });
    }

    function toggleCurrency(code) {
      const idx = activeCodes.indexOf(code);
      if (idx >= 0) {
        if (activeCodes.length <= 2) return;
        activeCodes.splice(idx, 1);
        if (widgetBase === code) widgetBase = 'KRW';
        if (chartCode === code) chartCode = null;
      } else {
        activeCodes.push(code);
      }
      lsSet('activeCodes', activeCodes);
      renderCurrencyGrid();
      renderBaseTabs();
      renderWidgetList();
      renderCalcInputs();
      updateActiveSub();
    }

    // ── Header ────────────────────────────────────────────
    function updateActiveSub() {
      document.getElementById('activeSub').textContent = activeCodes.join(' · ');
    }

    // ── Base Tabs ─────────────────────────────────────────
    function renderBaseTabs() {
      const el = document.getElementById('baseTabs');
      el.innerHTML = activeCodes.map(code => {
        const active = code === widgetBase;
        return `<button class="base-tab ${active ? 'active' : ''}" data-code="${code}">
          ${flagImg(code, 16)} ${code}
        </button>`;
      }).join('');
      el.querySelectorAll('.base-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          widgetBase = btn.dataset.code;
          lsSet('widgetBase', widgetBase);
          renderBaseTabs();
          renderWidgetList();
          document.getElementById('widgetBaseLabel').textContent = widgetBase;
          const amt = parseVal(document.getElementById('widgetAmountInput').value);
          widgetAmt = isFinite(amt) ? amt : 1000;
          document.getElementById('widgetAmountInput').value = fmtDisp(widgetAmt, widgetBase);
        });
      });
      document.getElementById('widgetBaseLabel').textContent = widgetBase;
    }

    // ── Widget List ───────────────────────────────────────
    function getChange(code) {
      if (!usdRates || !prevRates) return null;
      const newV = convertWith(usdRates, 1, code, 'KRW');
      const oldV = convertWith(prevRates, 1, code, 'KRW');
      if (!oldV || !newV) return null;
      return ((newV - oldV) / oldV) * 100;
    }

    function renderWidgetList() {
      if (!usdRates) return;
      const others = activeCodes.filter(c => c !== widgetBase);
      const list = document.getElementById('widgetList');
      list.innerHTML = others.map(code => {
        const val = convert(widgetAmt, widgetBase, code);
        const valTxt = val == null ? '-' : fmtDisp(val, code) + ' ' + code;
        const krwPer1 = convert(1, code, 'KRW');
        const rateTxt = krwPer1 != null ? '1 ' + code + ' ≈ ' + fmtRate(krwPer1) : '';
        const chg = getChange(code);
        let chgHtml = '';
        if (chg != null) {
          const abs = Math.abs(chg).toFixed(2);
          if (chg > 0.01)       chgHtml = `<span class="wi-change up">▲ ${abs}%</span>`;
          else if (chg < -0.01) chgHtml = `<span class="wi-change dn">▼ ${abs}%</span>`;
          else                  chgHtml = `<span class="wi-change" style="color:var(--muted)">- ${abs}%</span>`;
        }
        const selected = code === chartCode ? ' selected' : '';
        return `<li class="${selected}" data-code="${code}">
          <div class="wi-left">
            ${flagImg(code, 22)}
            <span>${code}</span>
            <span class="wi-time" id="clock-${code}"></span>
          </div>
          <div class="wi-right">
            <div class="wi-val">${valTxt}</div>
            <div class="wi-sub">
              ${rateTxt ? `<span class="wi-rate">${rateTxt}</span>` : ''}
              ${chgHtml}
            </div>
          </div>
        </li>`;
      }).join('');
      list.querySelectorAll('li').forEach(li => {
        li.addEventListener('click', () => selectChartCode(li.dataset.code));
      });
    }

    // ── Clocks ────────────────────────────────────────────
    function tickClocks() {
      const now = new Date();
      activeCodes.forEach(code => {
        const el = document.getElementById('clock-' + code);
        if (!el) return;
        const { tz } = ALL[code];
        el.textContent = now.toLocaleTimeString('ko-KR', { timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: true });
      });
    }

    // ── Chart ─────────────────────────────────────────────
    function initChart() {
      const ctx = document.getElementById('rateChart').getContext('2d');
      chartInst = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], borderWidth: 2, fill: true, tension: 0.35, pointRadius: 0, pointHoverRadius: 5 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { intersect: false, mode: 'index' },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: items => items[0]?.label || '',
                label: item => {
                  const v = item.parsed.y;
                  const dec = ALL[chartCode]?.int ? 0 : 2;
                  const formatted = new Intl.NumberFormat('ko-KR', { maximumFractionDigits: dec }).format(v);
                  return ` 1 ${chartCode} = ${formatted} ${widgetBase === 'KRW' ? 'KRW' : widgetBase}`;
                }
              }
            }
          },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,.05)' }, ticks: { color: '#8892a4', maxTicksLimit: 6, maxRotation: 0 } },
            y: { position: 'right', grid: { color: 'rgba(255,255,255,.05)' }, ticks: { color: '#8892a4', maxTicksLimit: 5 } }
          }
        }
      });
      updateChartColors();
    }

    async function fetchHistorical(days) {
      const today    = formatDate(new Date());
      const cacheKey = `hist_${days}_${today}`;
      // 오늘 날짜가 바뀌면 자동으로 새로 fetch (날짜가 key에 포함)
      const cached = JSON.parse(lsGet(cacheKey) || 'null');
      if (cached && (Date.now() - cached.ts) < 6 * 3600 * 1000) {
        histCache[days] = cached.data;
        return;
      }
      // 오늘부터 days+5일 전까지 요청 (주말·공휴일 제외해도 days개 이상 확보)
      const end   = new Date();
      const start = new Date(); start.setDate(start.getDate() - (days + 5));
      const targets = Object.keys(ALL).filter(c => c !== 'USD').join(',');
      try {
        const url = `${HIST_API}/${formatDate(start)}..${formatDate(end)}?from=USD&to=${targets}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('hist api');
        const json = await res.json();
        histCache[days] = json.rates || {};
        lsSet(cacheKey, JSON.stringify({ data: histCache[days], ts: Date.now() }));
      } catch (_) {
        histCache[days] = histCache[days] || {};
      }
    }

    async function selectChartCode(code) {
      chartCode = code;
      renderWidgetList();
      document.getElementById('chartTitle').textContent = `1 ${code} → KRW (${chartDays}일)`;
      document.getElementById('chartLoading').classList.remove('hidden');
      if (!histCache[chartDays]) await fetchHistorical(chartDays);
      document.getElementById('chartLoading').classList.add('hidden');
      drawChart();
    }

    function drawChart() {
      if (!chartInst || !chartCode) return;
      const data = histCache[chartDays] || {};
      const dates = Object.keys(data).sort().slice(-chartDays);
      const values = dates.map(d => {
        const r = data[d];
        if (!r || !r.KRW || !r[chartCode]) return null;
        return r.KRW / r[chartCode];
      });
      const color = CHART_COLORS[chartCode] || '#5ea1ff';
      const ctx = document.getElementById('rateChart').getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 0, 160);
      grad.addColorStop(0, color + '44');
      grad.addColorStop(1, color + '00');
      chartInst.data.labels = dates;
      chartInst.data.datasets[0].data = values;
      chartInst.data.datasets[0].borderColor = color;
      chartInst.data.datasets[0].backgroundColor = grad;
      chartInst.update();
      document.getElementById('chartTitle').textContent = `1 ${chartCode} → KRW (${chartDays}일)`;
    }

    // ── Favorites ─────────────────────────────────────────
    function renderFavorites() {
      const list = document.getElementById('favList');
      const editClass = favEditMode ? ' fav-edit-mode' : '';
      let html = favAmounts.map((amt, i) =>
        `<div class="fav-btn${editClass}" style="position:relative" data-idx="${i}">
          ${fmtDisp(amt, 'KRW')}
          <button class="fav-del" data-idx="${i}">✕</button>
        </div>`
      ).join('');
      if (!favEditMode) {
        html += favAddOpen
          ? `<div class="fav-input-row">
               <input class="fav-input" id="favInput" type="text" inputmode="numeric" placeholder="금액 입력" />
               <button class="fav-confirm" id="favConfirm">추가</button>
             </div>`
          : `<button class="fav-add-btn" id="favAddBtn">+</button>`;
      }
      list.innerHTML = html;

      list.querySelectorAll('.fav-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          if (e.target.classList.contains('fav-del')) return;
          const amt = favAmounts[+btn.dataset.idx];
          applyFavorite(amt);
        });
      });
      list.querySelectorAll('.fav-del').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          favAmounts.splice(+btn.dataset.idx, 1);
          lsSet('favAmounts', favAmounts);
          renderFavorites();
        });
      });
      const addBtn = document.getElementById('favAddBtn');
      if (addBtn) addBtn.addEventListener('click', () => { favAddOpen = true; renderFavorites(); setTimeout(() => document.getElementById('favInput')?.focus(), 50); });
      const favInput = document.getElementById('favInput');
      const favConfirm = document.getElementById('favConfirm');
      if (favConfirm) favConfirm.addEventListener('click', confirmFavAdd);
      if (favInput) favInput.addEventListener('keydown', e => { if (e.key === 'Enter') confirmFavAdd(); if (e.key === 'Escape') { favAddOpen = false; renderFavorites(); } });
    }

    function confirmFavAdd() {
      const v = parseVal(document.getElementById('favInput')?.value || '');
      if (isFinite(v) && v > 0) {
        favAmounts.push(Math.round(v));
        lsSet('favAmounts', favAmounts);
      }
      favAddOpen = false;
      renderFavorites();
    }

    function applyFavorite(amt) {
      const krwEl = calcEls['KRW'];
      if (krwEl) {
        krwEl.value = fmtDisp(amt, 'KRW');
        updateAllCalc('KRW');
      }
      widgetAmt = amt;
      lsSet('widgetAmt', widgetAmt);
      document.getElementById('widgetAmountInput').value = fmtDisp(amt, widgetBase === 'KRW' ? 'KRW' : widgetBase);
      renderWidgetList();
    }

    // ── Calc ──────────────────────────────────────────────
    function renderCalcInputs() {
      const container = document.getElementById('calcInputs');
      container.innerHTML = '';
      calcEls = {};
      activeCodes.forEach(code => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <label for="inp-${code}">
            ${flagImg(code, 20)} ${code}
          </label>
          <div class="input-wrap">
            <input id="inp-${code}" type="text" inputmode="decimal" autocomplete="off" />
            <button class="copy-btn" data-code="${code}" title="복사">⎘</button>
          </div>`;
        container.appendChild(row);
        const input = row.querySelector('input');
        calcEls[code] = input;
        input.addEventListener('input', () => { if (!isUpdating) updateAllCalc(code); });
        input.addEventListener('blur', () => {
          const v = parseVal(input.value);
          if (isFinite(v)) input.value = fmtDisp(v, code);
        });
        input.addEventListener('focus', () => {
          const v = parseVal(input.value);
          input.value = isFinite(v) ? (ALL[code]?.int ? String(Math.round(v)) : String(v)) : '';
          input.select();
        });
        row.querySelector('.copy-btn').addEventListener('click', () => {
          const v = parseVal(input.value);
          if (!isFinite(v)) return;
          navigator.clipboard.writeText(String(v)).then(() => showToast(`${code} 복사됨!`));
        });
      });
      if (usdRates) updateAllCalc('KRW');
    }

    function updateAllCalc(src) {
      if (!usdRates) return;
      const srcVal = parseVal(calcEls[src]?.value || '');
      if (!isFinite(srcVal)) return;
      isUpdating = true;
      activeCodes.forEach(code => {
        if (code === src) return;
        const v = convert(srcVal, src, code);
        const el = calcEls[code];
        if (!el || document.activeElement === el) return;
        el.value = v == null ? '' : fmtDisp(v, code);
      });
      isUpdating = false;
    }

    // ── Fetch ─────────────────────────────────────────────
    function setStatus(txt, type) {
      const el = document.getElementById('status');
      el.textContent = txt || '';
      el.className = 'status' + (type ? ' ' + type : '');
    }

    async function fetchRates() {
      setStatus('실시간 환율을 불러오는 중...');
      try {
        const res  = await fetch(RATE_API, { cache: 'no-store' });
        if (!res.ok) throw new Error('network');
        const data = await res.json();
        if (!data?.rates) throw new Error('payload');

        const today = new Date().toISOString().split('T')[0];
        const stored = JSON.parse(lsGet('ratesCache') || 'null');
        if (stored?.rates) {
          if (stored.date !== today) {
            lsSet('prevRatesCache', JSON.stringify({ rates: stored.rates }));
            prevRates = stored.rates;
          } else {
            prevRates = JSON.parse(lsGet('prevRatesCache') || 'null')?.rates || null;
          }
        }
        usdRates = data.rates;
        lsSet('ratesCache', JSON.stringify({ rates: usdRates, date: today }));

        const rawUp = data.time_last_update_utc || new Date().toUTCString();
        const koTime = new Date(rawUp).toLocaleString('ko-KR', {
          timeZone:'Asia/Seoul', year:'numeric', month:'2-digit', day:'2-digit',
          hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: true
        });
        document.getElementById('widgetUpdated').textContent = '마지막 업데이트: ' + koTime + ' (KST)';
        setStatus('업데이트 완료', 'ok');
        renderWidgetList();
        updateAllCalc('KRW');
        if (chartCode) drawChart();
      } catch (_) {
        const stored = JSON.parse(lsGet('ratesCache') || 'null');
        if (stored?.rates) {
          usdRates = stored.rates;
          renderWidgetList();
          updateAllCalc('KRW');
          setStatus('오프라인 캐시 사용 중 (마지막 저장된 환율)', 'error');
          document.getElementById('widgetUpdated').textContent = '마지막 업데이트: 오프라인';
        } else {
          setStatus('환율 API 연결 실패. 인터넷 상태를 확인해 주세요.', 'error');
          document.getElementById('widgetUpdated').textContent = '마지막 업데이트: 불러오기 실패';
        }
      }
    }

    // ── Bindings ──────────────────────────────────────────
    function bindAll() {
      document.getElementById('themeBtn').addEventListener('click', () => {
        darkMode = !darkMode;
        lsSet('darkMode', String(darkMode));
        applyTheme();
      });
      document.getElementById('settingsBtn').addEventListener('click', openSettings);
      document.getElementById('closeSettings').addEventListener('click', closeSettings);
      document.getElementById('overlay').addEventListener('click', closeSettings);
      document.getElementById('favEditBtn').addEventListener('click', () => {
        favEditMode = !favEditMode;
        document.getElementById('favEditBtn').textContent = favEditMode ? '완료' : '편집';
        renderFavorites();
      });
      const widgetInput = document.getElementById('widgetAmountInput');
      widgetInput.addEventListener('input', () => {
        const v = parseVal(widgetInput.value);
        if (isFinite(v)) { widgetAmt = v; lsSet('widgetAmt', v); renderWidgetList(); }
      });
      widgetInput.addEventListener('blur', () => {
        const v = parseVal(widgetInput.value);
        if (isFinite(v)) widgetInput.value = fmtDisp(v, widgetBase);
      });
      widgetInput.addEventListener('focus', () => {
        widgetInput.value = String(widgetAmt);
        widgetInput.select();
      });
      document.querySelectorAll('.period-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          chartDays = +btn.dataset.days;
          document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          if (chartCode) selectChartCode(chartCode);
        });
      });
    }

    // ── Init ──────────────────────────────────────────────
    function init() {
      applyTheme();
      updateActiveSub();
      renderCurrencyGrid();
      renderBaseTabs();
      renderCalcInputs();
      renderFavorites();
      initChart();
      bindAll();

      const stored = JSON.parse(lsGet('ratesCache') || 'null');
      if (stored?.rates) {
        usdRates = stored.rates;
        prevRates = JSON.parse(lsGet('prevRatesCache') || 'null')?.rates || null;
        document.getElementById('widgetAmountInput').value = fmtDisp(widgetAmt, widgetBase);
        renderWidgetList();
        updateAllCalc('KRW');
        const firstCode = activeCodes.find(c => c !== widgetBase);
        if (firstCode) selectChartCode(firstCode);
      } else {
        document.getElementById('widgetAmountInput').value = fmtDisp(widgetAmt, widgetBase);
      }

      fetchRates();
      setInterval(fetchRates, REFRESH_MS);
      tickClocks();
      setInterval(tickClocks, 1000);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  })();
  </script>
</body>
