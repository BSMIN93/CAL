<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5ea1ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="환율계산기" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>5개국 환율 계산기</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #202531;
      --widget: #1d2740;
      --text: #eef2ff;
      --muted: #9ea7bf;
      --accent: #5ea1ff;
      --accent-2: #7cb4ff;
      --danger: #ff6b6b;
      --border: #2b3242;
      --radius: 16px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
    }
    body { min-height: 100dvh; display: grid; place-items: center; padding: 14px; }
    .app {
      width: min(100%, 560px);
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      display: grid;
      gap: 14px;
    }
    h1 { margin: 0; font-size: clamp(1.2rem, 2.8vw, 1.55rem); }
    .sub { margin: 4px 0 0; color: var(--muted); font-size: 0.9rem; }
    .widget-card, .calc-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .widget-card { background: linear-gradient(180deg, var(--widget), #1a2236); }
    .calc-card { background: #111827; }
    .card-title { margin: 0 0 10px; font-size: 1rem; font-weight: 700; }
    .toggle { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 10px; }
    .toggle button {
      min-height: 48px; border-radius: 12px; border: 1px solid var(--border);
      background: #121722; color: var(--text); font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .toggle button.active { border-color: var(--accent); background: #1a2b4b; }
    .widget-list { display: grid; gap: 8px; margin: 0; padding: 0; list-style: none; }
    .widget-list li {
      display: flex; justify-content: space-between; gap: 10px;
      background: rgba(0,0,0,0.15); border: 1px solid #344260;
      border-radius: 12px; padding: 10px 12px; font-size: 0.98rem;
    }
    .muted { color: var(--muted); font-size: 0.84rem; margin-top: 8px; }
    .inputs { display: grid; gap: 10px; }
    .row { display: grid; grid-template-columns: 88px 1fr; align-items: center; gap: 10px; }
    .row label { color: var(--muted); font-weight: 600; }
    .row input {
      width: 100%; min-height: 54px; border-radius: 14px; border: 1px solid var(--border);
      background: #121722; color: var(--text); font-size: 1.06rem; padding: 0 14px; outline: none;
    }
    .row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(94,161,255,0.2); }
    .status { min-height: 1.2em; color: var(--muted); font-size: 0.84rem; margin-top: 10px; }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--accent-2); }
    @media (max-width: 430px) {
      body { padding: 10px; }
      .app { border-radius: 16px; padding: 12px; }
      .row { grid-template-columns: 1fr; gap: 6px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>실시간 5개국 환율 계산기</h1>
      <p class="sub">KRW · JPY · USD · EUR · HUF</p>
    </header>

    <section class="widget-card" aria-label="KRW 기준 실시간 위젯">
      <h2 class="card-title">KRW 기준 실시간 위젯</h2>
      <div class="toggle">
        <button type="button" class="base-btn active" data-krw="1000">1,000 KRW</button>
        <button type="button" class="base-btn" data-krw="10000">10,000 KRW</button>
      </div>
      <ul class="widget-list" id="widgetList">
        <li><span>JPY</span><strong>-</strong></li>
        <li><span>USD</span><strong>-</strong></li>
        <li><span>EUR</span><strong>-</strong></li>
        <li><span>HUF</span><strong>-</strong></li>
      </ul>
      <p id="widgetUpdated" class="muted">마지막 업데이트: 불러오는 중...</p>
    </section>

    <section class="calc-card" aria-label="자유 입력 계산기">
      <h2 class="card-title">자유 입력 계산기</h2>
      <div class="inputs">
        <div class="row"><label for="KRW">KRW</label><input id="KRW" type="number" inputmode="decimal" step="any" value="1000" /></div>
        <div class="row"><label for="JPY">JPY</label><input id="JPY" type="number" inputmode="decimal" step="any" /></div>
        <div class="row"><label for="USD">USD</label><input id="USD" type="number" inputmode="decimal" step="any" /></div>
        <div class="row"><label for="EUR">EUR</label><input id="EUR" type="number" inputmode="decimal" step="any" /></div>
        <div class="row"><label for="HUF">HUF</label><input id="HUF" type="number" inputmode="decimal" step="any" /></div>
      </div>
      <div id="status" class="status"></div>
    </section>
  </main>

  <script>
    (() => {
      const API_URL = "https://open.er-api.com/v6/latest/USD";
      const REFRESH_MS = 10 * 60 * 1000;
      const CODES = ["KRW", "JPY", "USD", "EUR", "HUF"];
      const WIDGET_CODES = ["JPY", "USD", "EUR", "HUF"];

      const statusEl = document.getElementById("status");
      const widgetListEl = document.getElementById("widgetList");
      const widgetUpdatedEl = document.getElementById("widgetUpdated");
      const baseButtons = Array.from(document.querySelectorAll(".base-btn"));
      const inputs = Object.fromEntries(CODES.map((c) => [c, document.getElementById(c)]));

      let usdRates = null;
      let selectedBaseKrw = 1000;
      let isUpdating = false;

      function setStatus(text, type) {
        statusEl.textContent = text || "";
        statusEl.className = "status" + (type ? " " + type : "");
      }

      function convert(amount, from, to) {
        if (!usdRates || !usdRates[from] || !usdRates[to]) return null;
        return (amount / usdRates[from]) * usdRates[to];
      }

      function fmt(value, code) {
        const dec = (code === "JPY" || code === "KRW" || code === "HUF") ? 0 : 4;
        return new Intl.NumberFormat("ko-KR", { minimumFractionDigits: 0, maximumFractionDigits: dec }).format(value);
      }

      function renderWidget() {
        if (!usdRates) return;
        widgetListEl.innerHTML = WIDGET_CODES.map((code) => {
          const val = convert(selectedBaseKrw, "KRW", code);
          const txt = val == null ? "-" : fmt(val, code) + " " + code;
          return "<li><span>" + code + "</span><strong>" + txt + "</strong></li>";
        }).join("");
      }

      function updateAllFrom(src) {
        if (!usdRates) return;
        const srcVal = Number(inputs[src].value);
        if (!Number.isFinite(srcVal)) return;
        isUpdating = true;
        CODES.forEach((code) => {
          if (code === src) return;
          const v = convert(srcVal, src, code);
          inputs[code].value = v == null ? "" : v.toFixed(6).replace(/\.?0+$/, "");
        });
        isUpdating = false;
      }

      function bindInputs() {
        CODES.forEach((code) => {
          inputs[code].addEventListener("input", () => {
            if (isUpdating) return;
            updateAllFrom(code);
          });
        });
      }

      function bindButtons() {
        baseButtons.forEach((btn) => {
          btn.addEventListener("click", () => {
            selectedBaseKrw = Number(btn.dataset.krw);
            baseButtons.forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            renderWidget();
          });
        });
      }

      async function fetchRates() {
        setStatus("실시간 환율을 불러오는 중...");
        try {
          const res = await fetch(API_URL, { cache: "no-store" });
          if (!res.ok) throw new Error("network");
          const data = await res.json();
          if (!data || !data.rates) throw new Error("payload");
          usdRates = data.rates;
          const updated = data.time_last_update_utc || new Date().toUTCString();
          widgetUpdatedEl.textContent = "마지막 업데이트: " + updated;
          setStatus("업데이트 완료", "ok");
          renderWidget();
          updateAllFrom("KRW");
        } catch (_) {
          setStatus("환율 API 연결 실패. 인터넷 상태를 확인해 주세요.", "error");
          widgetUpdatedEl.textContent = "마지막 업데이트: 불러오기 실패";
        }
      }

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js").catch(function () {});
        });
      }

      bindInputs();
      bindButtons();
      fetchRates();
      setInterval(fetchRates, REFRESH_MS);
    })();
  </script>
</body>
</html>
